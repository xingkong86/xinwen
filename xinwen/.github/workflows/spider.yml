name: Daily News Spider

on:
  schedule:
    # 每天北京时间早上8点、下午2点、晚上8点自动执行
    # (服务器是 UTC 时间，所以减 8 小时，即 0, 6, 12)
    - cron: '0 0,6,12 * * *'
  workflow_dispatch: # 这个配置允许你在 GitHub 网页上手动点击运行测试

jobs:
  run-spider:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 3.11 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫脚本
        run: |
          python run_spider.py